<style>
:root {
  --bg: #0a0e17;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --accent: #00E5A0;
  --red: #FF6B6B;
  --yellow: #FFD93D;
  --blue: #5B8DEF;
  --text: #fff;
  --dim: rgba(255,255,255,0.4);
  --glass: rgba(255,255,255,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Kufi Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px;
  position: relative;
  z-index: 1;
}

.bg-orbs {
  position: fixed; inset:0; pointer-events: none; z-index:0;
}
.bg-orbs::before, .bg-orbs::after {
  content:''; position:absolute; border-radius:50%;
}
.bg-orbs::before {
  width:300px; height:300px; top:10%; left:-100px;
  background: radial-gradient(circle, rgba(0,229,160,0.06), transparent 70%);
}
.bg-orbs::after {
  width:400px; height:400px; bottom:10%; right:-150px;
  background: radial-gradient(circle, rgba(255,107,107,0.05), transparent 70%);
}

.card {
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  margin-bottom: 16px;
}

.btn {
  padding: 14px 32px;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: inherit;
  border-radius: 14px;
  border: none;
  outline: none;
  cursor: pointer;
  transition: all .2s ease;
  width: 100%;
  display: block;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity:.4; cursor:not-allowed; transform:none !important; }

.btn-green {
  background: var(--accent);
  color: #0a0e17;
  box-shadow: 0 4px 20px rgba(0,229,160,0.3);
}
.btn-yellow {
  background: var(--yellow);
  color: #1a1a2e;
  box-shadow: 0 4px 20px rgba(255,217,61,0.3);
}
.btn-red {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,107,107,0.3);
}
.btn-blue {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 4px 20px rgba(91,141,239,0.3);
}
.btn-sm {
  padding: 8px 14px;
  font-size: .8rem;
  border-radius: 10px;
  width: auto;
  display: inline-block;
}

.input {
  padding: 14px 16px;
  font-size: 1rem;
  font-family: inherit;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--glass);
  color: #fff;
  outline: none;
  width: 100%;
  text-align: right;
  transition: border .2s ease;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: rgba(255,255,255,0.25); }
.input:disabled { opacity: .5; }

.input-code {
  text-align: center;
  letter-spacing: 10px;
  font-size: 1.4rem;
  font-weight: 700;
  text-transform: uppercase;
}

.divider {
  display: flex; align-items: center; gap: 8px; margin: 20px 0;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px; background: var(--border);
}
.divider span { color: var(--dim); font-size:.8rem; }

.player-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: 12px; margin-bottom: 8px;
  background: var(--glass); border: 1px solid var(--border);
  animation: slideUp .3s ease-out both;
}
.player-row.host {
  background: rgba(0,229,160,0.08);
  border-color: rgba(0,229,160,0.2);
}

.badge {
  font-size: .75rem; padding: 4px 10px; border-radius: 8px;
  background: rgba(0,229,160,0.15); color: var(--accent);
}
.badge-red {
  background: rgba(255,107,107,0.15); color: var(--red);
}
.badge-ai {
  background: rgba(91,141,239,0.15); color: var(--blue);
}

.letter-box {
  display: inline-flex; align-items: center; justify-content: center;
  width: 90px; height: 90px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(0,229,160,0.15), rgba(255,217,61,0.15));
  border: 3px solid var(--accent);
  font-size: 3rem; font-weight: 900; color: var(--accent);
}

.room-code {
  display: inline-block; padding: 12px 32px; border-radius: 16px;
  background: var(--glass); border: 2px dashed rgba(0,229,160,0.4);
  font-size: 2rem; font-weight: 900; letter-spacing: 10px; color: var(--accent);
  animation: glow 2s ease-in-out infinite;
}

.cat-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  animation: slideUp .3s ease-out both;
}
.cat-icon {
  min-width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; background: var(--glass); border: 1px solid var(--border);
}

.answer-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 10px; margin-bottom: 6px;
  transition: all .2s ease;
}
.answer-correct {
  background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2);
}
.answer-wrong {
  background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2);
}
.answer-empty {
  background: var(--glass); border: 1px solid var(--border);
}

.result-card {
  background: var(--card); border-radius: 18px; padding: 18px;
  margin-bottom: 12px; border: 1px solid var(--border);
  animation: slideUp .4s ease-out both;
}
.result-card.first { border-color: rgba(0,229,160,0.3); }

.toggle-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 1rem; display: flex;
  align-items: center; justify-content: center;
  transition: all .15s ease; flex-shrink: 0;
}
.toggle-btn:hover { transform: scale(1.1); }
.toggle-correct { background: rgba(0,229,160,0.2); }
.toggle-wrong { background: rgba(255,107,107,0.2); }
.toggle-empty { background: var(--glass); }

.ai-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .65rem; padding: 2px 8px; border-radius: 6px;
  background: rgba(91,141,239,0.12); color: var(--blue);
  margin-right: 4px;
}

.dots span {
  width:8px; height:8px; border-radius:50%; display:inline-block;
  margin: 0 3px; background: var(--accent);
  animation: pulse 1.4s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }

.alert-bar {
  text-align: center; padding: 12px 16px; border-radius: 12px;
  margin-bottom: 16px; animation: shake .5s ease;
}

.ai-status {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px; border-radius: 12px; margin-bottom: 16px;
  background: rgba(91,141,239,0.08); border: 1px solid rgba(91,141,239,0.2);
  font-size: .85rem; color: var(--blue);
}
.ai-status .spinner {
  width: 16px; height: 16px; border: 2px solid rgba(91,141,239,0.3);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin-anim .8s linear infinite;
}

.host-controls-banner {
  text-align: center; padding: 10px; border-radius: 12px;
  background: rgba(255,217,61,0.08); border: 1px solid rgba(255,217,61,0.2);
  margin-bottom: 16px; font-size: .8rem; color: var(--yellow);
}

.hidden { display: none !important; }
.center { text-align: center; }

@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(0,229,160,0.2)} 50%{box-shadow:0 0 40px rgba(0,229,160,0.5)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes spin-anim { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
@keyframes pop { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
</style>

<body>

<div class="bg-orbs"></div>
<div id="app"></div>

<script>
// ╔══════════════════════════════════════════════╗
// ║  🔥 Firebase Config                          ║
// ╚══════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyAt0hbH2f3aMJ2_f1pYZU8s6URr_chwhFI",
  authDomain: "name-dee18.firebaseapp.com",
  databaseURL: "https://name-dee18-default-rtdb.firebaseio.com",
  projectId: "name-dee18",
  storageBucket: "name-dee18.firebasestorage.app",
  messagingSenderId: "553439087531",
  appId: "1:553439087531:web:a05893dc8db9e60089e0ee"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ═══ Constants ═══
const LETTERS = ["أ","ب","ت","ث","ج","ح","خ","د","ر","ز","س","ش","ص","ط","ع","غ","ف","ق","ك","ل","م","ن","هـ","و","ي"];
const CATS = [
  { key:"name", label:"اسم", icon:"👤", ph:"اسم إنسان..." },
  { key:"object", label:"جماد", icon:"🪨", ph:"شي جماد..." },
  { key:"animal", label:"حيوان", icon:"🐾", ph:"اسم حيوان..." },
  { key:"plant", label:"نبات", icon:"🌿", ph:"اسم نبات..." },
  { key:"country", label:"بلاد", icon:"🌍", ph:"دولة أو مدينة..." },
];

const CAT_LABELS = {
  name: "اسم إنسان",
  object: "جماد (شيء غير حي)",
  animal: "حيوان",
  plant: "نبات",
  country: "دولة أو مدينة",
};

// ═══ State ═══
let state = {
  screen: "home",
  myName: "",
  roomCode: "",
  isHost: false,
  room: null,
  answers: {},
  locked: false,
  validating: false,
  aiValidating: false,
  results: null,
  error: "",
  hostOverrides: {},  // { playerName: { catKey: true/false } }
  scoresDirty: false,
};

let listeners = [];

// ═══ Helpers ═══
function genCode() {
  const c = "ABCDEFGHJKMNPQRSTUVWXYZ2345689";
  return Array.from({length:4}, () => c[Math.floor(Math.random()*c.length)]).join("");
}

function getBaseChar(str) {
  if (!str || !str.trim()) return "";
  const ch = str.trim().charAt(0);
  const alifs = ["أ","إ","آ","ا"];
  if (alifs.includes(ch)) return "أ";
  if (ch === "ة") return "ت";
  if (ch === "ه") return "هـ";
  return ch;
}

function startsWithLetter(answer, letter) {
  if (!answer || !answer.trim()) return false;
  const a = getBaseChar(answer);
  const l = letter === "هـ" ? "هـ" : getBaseChar(letter);
  return a === l;
}

function validateAnswersLocal(letter, answers) {
  const result = {};
  CATS.forEach(c => {
    const ans = (answers[c.key] || "").trim();
    result[c.key] = ans.length > 0 && startsWithLetter(ans, letter);
  });
  return result;
}

// ═══ AI Validation ═══
async function validateWithAI(letter, allPlayersAnswers) {
  // Build prompt for Claude
  const letterDisplay = letter === "هـ" ? "هـ" : letter;

  let prompt = `أنت حكم في لعبة "اسم جماد حيوان نبات بلاد".
الحرف المطلوب هو: "${letterDisplay}"

القواعد:
1. الإجابة لازم تبدأ بالحرف "${letterDisplay}"
2. الإجابة لازم تكون صحيحة وموجودة فعلاً (اسم حقيقي، حيوان حقيقي، نبات حقيقي، الخ)
3. "اسم" = اسم إنسان حقيقي (مش لقب أو كنية)
4. "جماد" = شيء غير حي وغير نبات
5. "حيوان" = حيوان حقيقي موجود
6. "نبات" = نبات حقيقي موجود
7. "بلاد" = دولة أو مدينة حقيقية موجودة
8. حرف الألف بكل أشكاله (أ، إ، آ، ا) يعتبر نفس الحرف
9. حرف الهاء (ه) وهـ يعتبر نفس الحرف

قيّم الإجابات التالية وارجع النتيجة بصيغة JSON فقط بدون أي نص إضافي:

`;

  const playersData = {};
  for (const [playerName, answers] of Object.entries(allPlayersAnswers)) {
    playersData[playerName] = {};
    CATS.forEach(c => {
      playersData[playerName][c.key] = (answers[c.key] || "").trim();
    });
    prompt += `اللاعب "${playerName}":\n`;
    CATS.forEach(c => {
      const ans = (answers[c.key] || "").trim();
      prompt += `  - ${CAT_LABELS[c.key]}: "${ans || "(فارغ)"}"\n`;
    });
    prompt += "\n";
  }

  prompt += `ارجع JSON بهذا الشكل بالضبط (بدون markdown أو backticks):
{
  "اسم_اللاعب": {
    "name": true/false,
    "object": true/false,
    "animal": true/false,
    "plant": true/false,
    "country": true/false
  }
}

true = الإجابة صحيحة وتبدأ بالحرف المطلوب
false = الإجابة خاطئة أو ما تبدأ بالحرف أو فاضية أو مش موجودة فعلاً`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
      }),
    });

    const data = await response.json();
    const text = (data.content || [])
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("");

    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    return parsed;
  } catch (err) {
    console.error("AI validation error:", err);
    return null;
  }
}

// ═══ Firebase Operations ═══
function roomRef(code) { return db.ref("rooms/" + code); }

function clearListeners() {
  listeners.forEach(l => l.off());
  listeners = [];
}

async function createRoom() {
  if (!state.myName.trim()) { state.error = "ادخل اسمك أول!"; render(); return; }
  const code = genCode();
  const name = state.myName.trim();
  const roomData = {
    host: name,
    status: "lobby",
    letter: "",
    round: 0,
    finisher: "",
  };

  await roomRef(code).set(roomData);
  await roomRef(code).child("players/" + name).set({ totalScore: 0, online: true });

  state.roomCode = code;
  state.isHost = true;
  state.screen = "lobby";
  state.error = "";
  render();
  listenToRoom(code);
}

async function joinRoom() {
  if (!state.myName.trim()) { state.error = "ادخل اسمك أول!"; render(); return; }
  const code = state.roomCode.trim().toUpperCase();
  if (!code || code.length < 3) { state.error = "ادخل كود الغرفة!"; render(); return; }

  const snap = await roomRef(code).once("value");
  if (!snap.exists()) { state.error = "الغرفة مو موجودة!"; render(); return; }

  const room = snap.val();
  if (room.status !== "lobby") { state.error = "اللعبة بدت خلاص!"; render(); return; }

  const name = state.myName.trim();
  if (room.players && room.players[name]) { state.error = "الاسم مستخدم!"; render(); return; }

  await roomRef(code).child("players/" + name).set({ totalScore: 0, online: true });

  state.roomCode = code;
  state.isHost = false;
  state.screen = "lobby";
  state.error = "";
  render();
  listenToRoom(code);
}

function listenToRoom(code) {
  clearListeners();
  const ref = roomRef(code);
  listeners.push(ref);

  ref.on("value", snap => {
    if (!snap.exists()) return;
    const room = snap.val();
    const prevStatus = state.room?.status;
    state.room = room;

    if (room.status === "playing" && state.screen === "lobby") {
      state.screen = "playing";
      state.locked = false;
      state.answers = {};
      state.results = null;
      state.hostOverrides = {};
      state.scoresDirty = false;
    }

    if (room.status === "stopped" && state.screen === "playing" && !state.locked) {
      state.locked = true;
      const name = state.myName.trim();
      const myAnswers = { ...state.answers };
      const validation = validateAnswersLocal(room.letter, myAnswers);
      roomRef(code).child("players/" + name).update({
        answers: myAnswers,
        validation: validation,
        submitted: true,
      });
    }

    if (room.status === "results" && state.screen !== "results") {
      buildResults(room);
      state.screen = "results";
    }

    if (room.status === "playing" && prevStatus === "results") {
      state.screen = "playing";
      state.locked = false;
      state.answers = {};
      state.results = null;
      state.hostOverrides = {};
      state.scoresDirty = false;
    }

    render();
  });
}

async function startGame() {
  const code = state.roomCode;
  const letter = LETTERS[Math.floor(Math.random() * LETTERS.length)];

  const snap = await roomRef(code).child("players").once("value");
  const players = snap.val() || {};
  for (const name of Object.keys(players)) {
    await roomRef(code).child("players/" + name).update({
      answers: null,
      validation: null,
      aiValidation: null,
      submitted: false,
      roundScore: 0,
    });
  }

  const currentRound = (state.room?.round || 0) + 1;
  await roomRef(code).update({
    status: "playing",
    letter: letter,
    round: currentRound,
    finisher: "",
  });
}

async function handleFinish() {
  if (state.locked) return;
  state.locked = true;

  const code = state.roomCode;
  const name = state.myName.trim();
  const myAnswers = { ...state.answers };
  const letter = state.room.letter;
  const validation = validateAnswersLocal(letter, myAnswers);

  await roomRef(code).child("players/" + name).update({
    answers: myAnswers,
    validation: validation,
    submitted: true,
  });

  const roomSnap = await roomRef(code).once("value");
  const room = roomSnap.val();
  if (room.status === "playing") {
    await roomRef(code).update({ status: "stopped", finisher: name });
    setTimeout(() => calculateScores(), 3000);
  }

  render();
}

async function calculateScores() {
  state.validating = true;
  state.aiValidating = true;
  render();

  const code = state.roomCode;
  const roomSnap = await roomRef(code).once("value");
  const room = roomSnap.val();
  const players = room.players || {};
  const letter = room.letter;
  const finisher = room.finisher;

  // Collect all answers for AI
  const allAnswers = {};
  for (const [name, pData] of Object.entries(players)) {
    allAnswers[name] = pData.answers || {};
  }

  // Try AI validation
  let aiResults = null;
  try {
    aiResults = await validateWithAI(letter, allAnswers);
  } catch (e) {
    console.error("AI failed, using local validation:", e);
  }

  state.aiValidating = false;
  render();

  for (const [name, pData] of Object.entries(players)) {
    const answers = pData.answers || {};
    // Use AI validation if available, otherwise fall back to local
    let validation;
    if (aiResults && aiResults[name]) {
      validation = aiResults[name];
    } else {
      validation = pData.validation || validateAnswersLocal(letter, answers);
    }

    let correct = 0, wrong = 0;
    CATS.forEach(c => {
      const ans = (answers[c.key] || "").trim();
      if (!ans) return;
      if (validation[c.key]) correct++;
      else wrong++;
    });

    let roundScore = correct * 10;
    if (name === finisher) {
      if (wrong > 0) roundScore -= (wrong * 5);
      if (wrong === 0 && correct === 5) roundScore += 5;
    }

    const totalScore = (pData.totalScore || 0) + roundScore;

    await roomRef(code).child("players/" + name).update({
      validation: validation,
      aiValidation: aiResults ? (aiResults[name] || null) : null,
      roundScore: roundScore,
      totalScore: totalScore,
    });
  }

  await roomRef(code).update({ status: "results" });
  state.validating = false;
}

function buildResults(room) {
  const players = room.players || {};
  const res = {};
  for (const [name, pData] of Object.entries(players)) {
    res[name] = {
      answers: pData.answers || {},
      validation: pData.validation || {},
      aiValidation: pData.aiValidation || null,
      roundScore: pData.roundScore || 0,
      totalScore: pData.totalScore || 0,
    };
  }
  state.results = res;
  // Initialize host overrides from current validation
  state.hostOverrides = {};
  for (const [name, data] of Object.entries(res)) {
    state.hostOverrides[name] = { ...data.validation };
  }
}

// Host toggles an answer's validity
function toggleAnswer(playerName, catKey) {
  if (!state.isHost) return;
  if (!state.hostOverrides[playerName]) {
    state.hostOverrides[playerName] = { ...(state.results[playerName]?.validation || {}) };
  }
  state.hostOverrides[playerName][catKey] = !state.hostOverrides[playerName][catKey];
  state.scoresDirty = true;
  render();
}

// Host applies overrides and recalculates scores
async function applyHostOverrides() {
  const code = state.roomCode;
  const room = state.room;
  const finisher = room.finisher;
  const players = room.players || {};

  for (const [name, overrides] of Object.entries(state.hostOverrides)) {
    const pData = players[name] || {};
    const answers = pData.answers || {};

    let correct = 0, wrong = 0;
    CATS.forEach(c => {
      const ans = (answers[c.key] || "").trim();
      if (!ans) return;
      if (overrides[c.key]) correct++;
      else wrong++;
    });

    let roundScore = correct * 10;
    if (name === finisher) {
      if (wrong > 0) roundScore -= (wrong * 5);
      if (wrong === 0 && correct === 5) roundScore += 5;
    }

    // Recalculate total: previous total - old round score + new round score
    const oldRoundScore = pData.roundScore || 0;
    const totalScore = (pData.totalScore || 0) - oldRoundScore + roundScore;

    await roomRef(code).child("players/" + name).update({
      validation: overrides,
      roundScore: roundScore,
      totalScore: totalScore,
    });
  }

  state.scoresDirty = false;
  // Re-fetch
  const snap = await roomRef(code).once("value");
  if (snap.exists()) {
    buildResults(snap.val());
  }
  render();
}

async function nextRound() {
  state.locked = false;
  state.answers = {};
  state.results = null;
  state.hostOverrides = {};
  state.scoresDirty = false;
  await startGame();
}

// ═══ Render ═══
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.style.animation = "none";
  void app.offsetWidth;
  app.style.animation = "fadeIn .4s ease-out";

  switch(state.screen) {
    case "home": renderHome(app); break;
    case "lobby": renderLobby(app); break;
    case "playing": renderPlaying(app); break;
    case "results": renderResults(app); break;
  }
}

function renderHome(app) {
  app.innerHTML = `
    <div style="padding-top:8vh; text-align:center;">
      <div style="font-size:3rem; margin-bottom:8px;">🎯</div>
      <h1 style="font-size:1.7rem; font-weight:900; margin-bottom:6px;
        background:linear-gradient(135deg, var(--accent), var(--yellow));
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        اسم جماد حيوان نبات بلاد
      </h1>
      <p style="color:var(--dim); font-size:.85rem; margin-bottom:32px;">
        العب مع أصحابك — كل واحد من جهازه!
      </p>
    </div>

    <div class="card">
      <label style="font-size:.85rem; color:var(--dim); margin-bottom:8px; display:block;">اسمك</label>
      <input id="inp-name" class="input" placeholder="ادخل اسمك..." value="${state.myName}">
      ${state.error ? `<p style="color:var(--red); font-size:.85rem; margin-top:8px; animation:shake .4s ease;">${state.error}</p>` : ""}

      <button id="btn-create" class="btn btn-green" style="margin-top:20px;">إنشاء غرفة جديدة 🏠</button>

      <div class="divider"><span>أو</span></div>

      <label style="font-size:.85rem; color:var(--dim); margin-bottom:8px; display:block;">كود الغرفة</label>
      <input id="inp-code" class="input input-code" placeholder="AB3K" maxlength="4" value="${state.roomCode}">

      <button id="btn-join" class="btn btn-yellow" style="margin-top:16px;">انضم للغرفة 🚪</button>
    </div>

    <div style="text-align:center; margin-top:16px;">
      <span class="ai-badge" style="font-size:.75rem; padding:6px 14px;">
        🤖 مدعوم بالذكاء الاصطناعي لتقييم الإجابات
      </span>
    </div>
  `;

  document.getElementById("inp-name").addEventListener("input", e => {
    state.myName = e.target.value;
    state.error = "";
  });
  document.getElementById("inp-code").addEventListener("input", e => {
    state.roomCode = e.target.value.toUpperCase();
    state.error = "";
  });
  document.getElementById("btn-create").addEventListener("click", createRoom);
  document.getElementById("btn-join").addEventListener("click", joinRoom);
}

function renderLobby(app) {
  const room = state.room || {};
  const players = room.players ? Object.keys(room.players) : [];

  app.innerHTML = `
    <div style="text-align:center; margin: 20px 0 24px;">
      <p style="color:var(--dim); font-size:.85rem; margin-bottom:8px;">كود الغرفة — شاركه مع أصحابك!</p>
      <div class="room-code">${state.roomCode}</div>
    </div>

    <div class="card">
      <h3 style="font-size:1rem; font-weight:700; margin-bottom:16px; color:var(--yellow);">
        👥 اللاعبين (${players.length})
      </h3>
      ${players.map((p, i) => `
        <div class="player-row ${p === room.host ? 'host' : ''}" style="animation-delay:${i * .08}s">
          <span style="font-weight:600;">${p === state.myName.trim() ? p + " (أنت)" : p}</span>
          ${p === room.host ? '<span class="badge">👑 المدير</span>' : ""}
        </div>
      `).join("")}
    </div>

    ${state.isHost ? `
      <button id="btn-start" class="btn btn-green" ${players.length < 2 ? "disabled" : ""}>

      </button>
    ` : `
      <div class="center" style="padding:20px;">
        <p style="color:var(--dim);">بانتظار المدير يبدأ اللعبة</p>
        <div class="dots" style="margin-top:12px;"><span></span><span></span><span></span></div>
      </div>
    `}
  `;

  if (state.isHost) {
    const btn = document.getElementById("btn-start");
    if (btn) btn.addEventListener("click", startGame);

}

function renderPlaying(app) {
  const room = state.room || {};
  const letter = room.letter || "؟";
  const filledCount = CATS.filter(c => (state.answers[c.key] || "").trim()).length;

  app.innerHTML = `
    <div class="center" style="margin:16px 0 20px;">
      <p style="color:var(--dim); font-size:.8rem; margin-bottom:8px;">
        الجولة ${room.round || 1}
      </p>
      <div class="letter-box">${letter}</div>
      <p style="color:var(--accent); font-size:.85rem; font-weight:600; margin-top:8px;">الحرف: ${letter}</p>
    </div>

    ${state.locked ? `
      <div class="alert-bar" style="background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3);">
        <p style="color:var(--red); font-weight:700; font-size:.95rem;">
          ⏱️ ${room.finisher === state.myName.trim() ? "أنت خلصت أول واحد!" : (room.finisher || "لاعب") + " خلص أول!"}
        </p>
        ${state.aiValidating ? `
          <div class="ai-status" style="margin-top:8px; background:transparent; border:none;">
            <div class="spinner"></div>
            <span>الذكاء الاصطناعي يقيّم الإجابات...</span>
          </div>
        ` : state.validating ? '<p style="color:var(--dim); font-size:.8rem; margin-top:4px;">جاري حساب النتائج...</p>' : ""}
      </div>
    ` : ""}

    <div id="cats-container">
      ${CATS.map((c, i) => `
        <div class="cat-row" style="animation-delay:${i * .06}s">
          <div class="cat-icon">${c.icon}</div>
          <input class="input cat-input" data-key="${c.key}" placeholder="${c.ph}"
            value="${state.answers[c.key] || ""}" ${state.locked ? "disabled" : ""}>
        </div>
      `).join("")}
    </div>

    ${!state.locked ? `
      <button id="btn-finish" class="btn ${filledCount === 5 ? 'btn-green' : 'btn-yellow'}"
        style="margin-top:20px;" ${filledCount === 0 ? "disabled" : ""}>
        ${filledCount === 5 ? "خلصت! 🏁" : `خلصت (${filledCount}/5) ⚡`}
      </button>
    ` : ""}

    ${state.locked && state.validating ? `
      <div class="center" style="margin-top:24px;">
        <div style="font-size:2rem; animation:pulse 1s infinite;">⏳</div>
      </div>
    ` : ""}
  `;

  document.querySelectorAll(".cat-input").forEach(inp => {
    inp.addEventListener("input", e => {
      state.answers[e.target.dataset.key] = e.target.value;
      const filled = CATS.filter(c => (state.answers[c.key] || "").trim()).length;
      const btn = document.getElementById("btn-finish");
      if (btn) {
        btn.disabled = filled === 0;
        btn.className = "btn " + (filled === 5 ? "btn-green" : "btn-yellow");
        btn.textContent = filled === 5 ? "خلصت! 🏁" : "خلصت (" + filled + "/5) ⚡";
      }
    });
  });

  if (!state.locked) {
    const btn = document.getElementById("btn-finish");
    if (btn) btn.addEventListener("click", handleFinish);
  }
}

function renderResults(app) {
  const room = state.room || {};
  const results = state.results || {};
  const overrides = state.hostOverrides || {};

  // Sort by effective scores (considering overrides)
  const sorted = Object.entries(results).sort(([,a],[,b]) => {
    const aScore = getEffectiveTotal(a, overrides, room);
    const bScore = getEffectiveTotal(b, overrides, room);
    return bScore - aScore;
  });
  const medals = ["🥇","🥈","🥉","🎮","🎮","🎮","🎮","🎮"];

  const hasAI = Object.values(results).some(d => d.aiValidation);

  app.innerHTML = `
    <div class="center" style="margin:12px 0 20px;">
      <div style="font-size:2.5rem; margin-bottom:4px; animation:pop .5s ease-out;">🏆</div>
      <h2 style="font-size:1.3rem; font-weight:900; color:var(--yellow);">النتائج — جولة ${room.round || 1}</h2>
      <p style="color:var(--dim); font-size:.8rem; margin-top:4px;">الحرف: ${room.letter}</p>
      ${hasAI ? '<div class="ai-badge" style="margin-top:8px; font-size:.75rem; padding:4px 12px;">🤖 تم التقييم بالذكاء الاصطناعي</div>' : ""}
    </div>

    ${state.isHost ? `
      <div class="host-controls-banner">
        👑 أنت المدير — اضغط ✅/❌ عشان تعدّل تقييم أي إجابة
      </div>
    ` : ""}

    ${sorted.map(([name, data], idx) => {
      const pOverrides = overrides[name] || data.validation;
      const effectiveRound = calcRoundScore(name, data, pOverrides, room.finisher);
      const effectiveTotal = (data.totalScore || 0) - (data.roundScore || 0) + effectiveRound;

      return `
      <div class="result-card ${idx === 0 ? 'first' : ''}" style="animation-delay:${idx * .1}s">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-size:1.3rem;">${medals[Math.min(idx, 7)]}</span>
            <span style="font-weight:700; font-size:1.05rem;">${name}${name === state.myName.trim() ? " (أنت)" : ""}</span>
            ${room.finisher === name ? '<span class="badge badge-red">⚡ أول</span>' : ""}
          </div>
          <div style="text-align:left;">
            <div style="font-weight:900; font-size:1.3rem; color:${effectiveRound >= 0 ? 'var(--accent)' : 'var(--red)'};">
              ${effectiveRound >= 0 ? "+" : ""}${effectiveRound}
            </div>
            <div style="font-size:.7rem; color:var(--dim);">المجموع: ${effectiveTotal}</div>
          </div>
        </div>

        ${CATS.map(c => {
          const ans = (data.answers?.[c.key] || "").trim();
          const isValid = pOverrides[c.key];
          const cls = !ans ? "answer-empty" : isValid ? "answer-correct" : "answer-wrong";
          return `
            <div class="answer-row ${cls}">
              <span style="font-size:.9rem;">${c.icon}</span>
              <span style="flex:1; font-size:.9rem; color:${ans ? '#fff' : 'var(--dim)'};">${ans || "—"}</span>
              ${state.isHost && ans ? `
                <button class="toggle-btn ${isValid ? 'toggle-correct' : 'toggle-wrong'}"
                  data-player="${name}" data-cat="${c.key}">
                  ${isValid ? "✅" : "❌"}
                </button>
              ` : `
                <span style="font-size:1rem;">${!ans ? "⬜" : isValid ? "✅" : "❌"}</span>
              `}
            </div>
          `;
        }).join("")}
      </div>
    `;}).join("")}

    ${state.isHost && state.scoresDirty ? `
      <button id="btn-apply" class="btn btn-blue" style="margin-bottom:12px;">
        تحديث النقاط بعد التعديل 📝
      </button>
    ` : ""}

    ${state.isHost ? `
      <button id="btn-next" class="btn btn-green" style="margin-top:4px;">جولة جديدة 🔄</button>
    ` : `
      <div class="center" style="padding:16px;">
        <p style="color:var(--dim); font-size:.85rem;">بانتظار المدير يبدأ جولة جديدة...</p>
        <div class="dots" style="margin-top:8px;"><span></span><span></span><span></span></div>
      </div>
    `}
  `;

  // Host toggle listeners
  if (state.isHost) {
    document.querySelectorAll(".toggle-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const player = btn.dataset.player;
        const cat = btn.dataset.cat;
        toggleAnswer(player, cat);
      });
    });

    const applyBtn = document.getElementById("btn-apply");
    if (applyBtn) applyBtn.addEventListener("click", applyHostOverrides);

    const nextBtn = document.getElementById("btn-next");
    if (nextBtn) nextBtn.addEventListener("click", nextRound);
  }
}

function calcRoundScore(name, data, validation, finisher) {
  const answers = data.answers || {};
  let correct = 0, wrong = 0;
  CATS.forEach(c => {
    const ans = (answers[c.key] || "").trim();
    if (!ans) return;
    if (validation[c.key]) correct++;
    else wrong++;
  });
  let score = correct * 10;
  if (name === finisher) {
    if (wrong > 0) score -= (wrong * 5);
    if (wrong === 0 && correct === 5) score += 5;
  }
  return score;
}

function getEffectiveTotal(data, overrides, room) {
  // Just for sorting
  return data.totalScore || 0;
}

// ═══ Start ═══
render();
</script>
